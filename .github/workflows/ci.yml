name: CI Pipeline Completo

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

  workflow_dispatch:

# variables a nivel del workflow
env: 
    NODE_VERSION: "20"

jobs:
  # ======JOB 1: LINT ======
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run lint

  # ======JOB 1: TEST ======
  test:
    name: Test
    runs-on:  ubuntu-latest
    needs: lint
    steps: 
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Run Tests with coverage
        run: npm run test:coverage 

  # ======JOB 1: TEST ======
  build: 
    name: build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - run: npm run build
